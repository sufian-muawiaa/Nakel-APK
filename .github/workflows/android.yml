name: Build Nakel APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: |
          cd capacitor-project
          npm install

      - name: Add Android platform
        run: |
          cd capacitor-project
          npx cap add android
          npx cap sync android

      - name: Build APK
        run: |
          cd capacitor-project/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nakel-apk
          path: capacitor-project/android/app/build/outputs/apk/debug/app-debug.apk
